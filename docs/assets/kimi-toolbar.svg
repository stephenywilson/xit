<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="360" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="400" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#e6edf3" text-anchor="middle">Optional Kimi CLI Toolbar Patch</text>
  <text x="400" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Shows XiT status in Kimi's bottom bar · opt-in · rollback supported</text>

  <!-- Kimi window simulation -->
  <rect x="60" y="78" width="680" height="248" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="60" y="78" width="680" height="36" rx="10" fill="#21262d"/>
  <rect x="60" y="98" width="680" height="16" fill="#21262d"/>
  <circle cx="88" cy="96" r="6" fill="#ff5f57"/>
  <circle cx="110" cy="96" r="6" fill="#febc2e"/>
  <circle cx="132" cy="96" r="6" fill="#28c840"/>
  <text x="400" y="100" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#8b949e" text-anchor="middle">kimi — ~/projects/xit</text>

  <!-- Kimi chat area -->
  <text x="90" y="138" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6e7681">Kimi ></text>
  <text x="138" y="138" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#e6edf3">Running tests with XiT compression...</text>

  <text x="90" y="162" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6e7681">Kimi ></text>
  <text x="138" y="162" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#e6edf3">xit auto go test -v ./...</text>

  <!-- XiT summary in chat -->
  <rect x="90" y="174" width="550" height="60" rx="6" fill="#132a1e" stroke="#1e4a30" stroke-width="1"/>
  <text x="106" y="193" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#56f5a3">XiT Auto Summary  ·  exit_code: 0  ·  reduction: 99%</text>
  <text x="106" y="211" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#8b949e">All tests passed  ·  raw_log: .xit/runs/20260530-go-test.raw.log</text>
  <text x="106" y="227" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#6e7681">saved_tokens ≈ 9000  (saved_bytes / 4 estimate)</text>

  <!-- Input area -->
  <rect x="60" y="280" width="680" height="2" fill="#30363d"/>
  <text x="90" y="298" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#6e7681">> </text>
  <text x="106" y="298" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#e6edf3">|</text>

  <!-- Bottom toolbar (the XiT patch area) -->
  <rect x="60" y="304" width="680" height="22" rx="0" fill="#0d4a2d"/>
  <rect x="60" y="304" width="680" height="22" rx="0" fill="none" stroke="#56f5a3" stroke-width="0.5" opacity="0.4"/>

  <!-- Toolbar states - showing different rotations -->
  <!-- State 1 (left) -->
  <rect x="68" y="308" width="188" height="14" rx="3" fill="#0a3520"/>
  <text x="162" y="319" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#56f5a3" text-anchor="middle">吸T神功 · 准备就绪</text>

  <!-- State 2 (middle) -->
  <rect x="268" y="308" width="192" height="14" rx="3" fill="#0a3520"/>
  <text x="364" y="319" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#56f5a3" text-anchor="middle">吸T神功 · 正在吸T中 ⟳</text>

  <!-- State 3 (right) -->
  <rect x="472" y="308" width="254" height="14" rx="3" fill="#0a3520"/>
  <text x="599" y="319" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#56f5a3" text-anchor="middle">本次吸T 1次 · 省 ~9k Token</text>

  <!-- Caption -->
  <text x="400" y="348" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11.5" fill="#6e7681" text-anchor="middle">Toolbar cycles through status every 15s · install: xit kimi status-patch install --yes --accept-risk</text>
</svg>
