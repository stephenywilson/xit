<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a12"/>
      <stop offset="100%" stop-color="#0a0f0c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="220" fill="url(#mbg)"/>

  <!-- Section title -->
  <text x="400" y="26" font-family="'PingFang SC', 'Microsoft YaHei', Georgia, serif" font-size="13" fill="#6b7280" text-anchor="middle">实战战绩 · 本地 dogfood 数据 · Token 为估算值（saved_bytes / 4）</text>

  <!-- Card 1 -->
  <rect x="20" y="42" width="175" height="152" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="107" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="800" fill="#56f5a3" text-anchor="middle">91.5%</text>
  <line x1="40" y1="108" x2="175" y2="108" stroke="#1e3a24" stroke-width="1"/>
  <text x="107" y="130" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">历史输出</text>
  <text x="107" y="148" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">压缩率</text>
  <text x="107" y="180" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">120 条命令</text>

  <!-- Card 2 -->
  <rect x="208" y="42" width="175" height="152" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="295" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="800" fill="#56f5a3" text-anchor="middle">98.7%</text>
  <line x1="228" y1="108" x2="363" y2="108" stroke="#1e3a24" stroke-width="1"/>
  <text x="295" y="130" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">当前会话</text>
  <text x="295" y="148" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">压缩率</text>
  <text x="295" y="180" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">本次 6 条命令</text>

  <!-- Card 3 -->
  <rect x="396" y="42" width="175" height="152" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="483" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="800" fill="#56f5a3" text-anchor="middle">~340k</text>
  <line x1="416" y1="108" x2="551" y2="108" stroke="#1e3a24" stroke-width="1"/>
  <text x="483" y="130" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">估算已省</text>
  <text x="483" y="148" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Token（历史）</text>
  <text x="483" y="180" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">saved_bytes / 4 估算</text>

  <!-- Card 4 -->
  <rect x="584" y="42" width="196" height="152" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="682" y="92" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="800" fill="#ffd700" text-anchor="middle">~9k</text>
  <line x1="604" y1="108" x2="760" y2="108" stroke="#1e3a24" stroke-width="1"/>
  <text x="682" y="130" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">最近单次</text>
  <text x="682" y="148" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Token 节省</text>
  <text x="682" y="180" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">go test -v ./...</text>
</svg>
