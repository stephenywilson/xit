<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#56f5a3"/>
    </marker>
  </defs>

  <rect width="800" height="300" fill="url(#wbg)"/>

  <!-- Title -->
  <text x="400" y="32" font-family="'PingFang SC', 'Microsoft YaHei', Georgia, serif" font-size="16" font-weight="700" fill="url(#goldGrad)" text-anchor="middle">内功运转流程</text>

  <!-- Step 1: AI 发起命令 -->
  <rect x="20" y="60" width="132" height="100" rx="10" fill="#0f1117" stroke="#1e2530" stroke-width="1.5"/>
  <text x="86" y="88" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#56f5a3" text-anchor="middle">① AI 发起命令</text>
  <text x="86" y="108" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">go test</text>
  <text x="86" y="124" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">git diff</text>
  <text x="86" y="140" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">grep -r</text>

  <!-- Arrow -->
  <line x1="156" y1="110" x2="190" y2="110" stroke="#56f5a3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: xit auto 运功 -->
  <rect x="194" y="60" width="132" height="100" rx="10" fill="#0a120d" stroke="#1e4a30" stroke-width="1.5"/>
  <text x="260" y="88" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#56f5a3" text-anchor="middle">② 运转吸T神功</text>
  <text x="260" y="108" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">xit auto</text>
  <text x="260" y="124" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">捕获输出</text>
  <text x="260" y="140" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">运行过滤器</text>

  <!-- Down arrow to raw_log -->
  <line x1="260" y1="164" x2="260" y2="198" stroke="#56f5a3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Right arrow to summary -->
  <line x1="330" y1="110" x2="364" y2="110" stroke="#56f5a3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3a: raw_log 留证 -->
  <rect x="194" y="202" width="132" height="72" rx="10" fill="#0f1117" stroke="#1e2530" stroke-width="1.5"/>
  <text x="260" y="226" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#4299e1" text-anchor="middle">③ raw_log 留证</text>
  <text x="260" y="246" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">完整输出本地</text>
  <text x="260" y="262" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">随时可查</text>

  <!-- Step 3b: 摘要输出 -->
  <rect x="368" y="60" width="134" height="100" rx="10" fill="#0f1117" stroke="#1e2530" stroke-width="1.5"/>
  <text x="435" y="88" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#56f5a3" text-anchor="middle">③ 摘要输出</text>
  <text x="435" y="108" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">exit_code: 0</text>
  <text x="435" y="124" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">reduction: 99%</text>
  <text x="435" y="140" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">关键要点</text>

  <!-- Arrow -->
  <line x1="506" y1="110" x2="540" y2="110" stroke="#56f5a3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: 进入 AI 上下文 -->
  <rect x="544" y="60" width="134" height="100" rx="10" fill="#12101a" stroke="#3a2d6b" stroke-width="1.5"/>
  <text x="611" y="85" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#9f7aea" text-anchor="middle">④ 进入 AI 上下文</text>
  <text x="611" y="105" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">精简上下文</text>
  <text x="611" y="121" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Token 压力降低</text>
  <text x="611" y="137" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">Kimi / Claude / …</text>

  <!-- Privacy badge -->
  <rect x="20" y="202" width="164" height="72" rx="10" fill="#0f1117" stroke="#1e2530" stroke-width="1.5"/>
  <text x="102" y="226" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#56f5a3" text-anchor="middle" font-weight="600">安全隐私</text>
  <text x="102" y="246" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">✓ 无 telemetry</text>
  <text x="102" y="262" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#6b7280" text-anchor="middle">✓ 全程本地</text>

  <!-- Bottom note -->
  <text x="400" y="288" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11.5" fill="#374151" text-anchor="middle">全程本地运功 · 无任何数据离开本机 · raw_log 是你的审计留证</text>
</svg>
