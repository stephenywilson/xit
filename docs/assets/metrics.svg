<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a12"/>
      <stop offset="100%" stop-color="#0a0f0c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="240" fill="url(#mbg)"/>

  <!-- Section title -->
  <text x="400" y="26" font-family="'PingFang SC', 'Microsoft YaHei', Georgia, serif" font-size="13" fill="#6b7280" text-anchor="middle">预计收益 · 实际效果取决于命令类型与 AI CLI 使用方式</text>

  <!-- Card 1: 压缩率 -->
  <rect x="20" y="42" width="175" height="162" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="107" y="96" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="800" fill="#56f5a3" text-anchor="middle">80–95%</text>
  <line x1="40" y1="112" x2="175" y2="112" stroke="#1e3a24" stroke-width="1"/>
  <text x="107" y="134" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">高噪音命令</text>
  <text x="107" y="152" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">预计压缩率</text>
  <text x="107" y="190" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">目标区间</text>

  <!-- Card 2: Token节省 -->
  <rect x="208" y="42" width="175" height="162" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="295" y="96" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="800" fill="#56f5a3" text-anchor="middle">80%+</text>
  <line x1="228" y1="112" x2="363" y2="112" stroke="#1e3a24" stroke-width="1"/>
  <text x="295" y="134" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">高命中场景</text>
  <text x="295" y="152" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">预计 Token 节省</text>
  <text x="295" y="190" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">saved_bytes / 4 估算</text>

  <!-- Card 3: 命中率目标 -->
  <rect x="396" y="42" width="175" height="162" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="483" y="96" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="800" fill="#56f5a3" text-anchor="middle">90%+</text>
  <line x1="416" y1="112" x2="551" y2="112" stroke="#1e3a24" stroke-width="1"/>
  <text x="483" y="134" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">AI CLI 路由</text>
  <text x="483" y="152" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">命中率目标</text>
  <text x="483" y="190" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">正确使用 xit auto</text>

  <!-- Card 4: raw_log -->
  <rect x="584" y="42" width="196" height="162" rx="10" fill="url(#cardGrad)" stroke="#1e3a24" stroke-width="1.5"/>
  <text x="682" y="82" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="28" font-weight="800" fill="#4299e1" text-anchor="middle">raw_log</text>
  <text x="682" y="108" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#56f5a3" text-anchor="middle">本地留证</text>
  <line x1="604" y1="118" x2="760" y2="118" stroke="#1e3a24" stroke-width="1"/>
  <text x="682" y="140" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">零遥测</text>
  <text x="682" y="158" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">不上传日志</text>
  <text x="682" y="190" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#374151" text-anchor="middle">.xit/runs/ 本地保存</text>

  <!-- Bottom note -->
  <text x="400" y="222" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#374151" text-anchor="middle">实际效果取决于命令类型、输出规模与 AI CLI 使用方式 · Token 为 saved_bytes / 4 估算</text>
</svg>
