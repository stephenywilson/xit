<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c0f"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12171e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#56f5a3" flood-opacity="0.3"/>
    </filter>
    <filter id="goldGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ffd700" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="url(#hbg)"/>

  <!-- Decorative side lines -->
  <line x1="28" y1="20" x2="28" y2="440" stroke="#2a1a00" stroke-width="1"/>
  <line x1="772" y1="20" x2="772" y2="440" stroke="#2a1a00" stroke-width="1"/>
  <line x1="28" y1="20" x2="772" y2="20" stroke="#2a1a00" stroke-width="1"/>
  <line x1="28" y1="440" x2="772" y2="440" stroke="#2a1a00" stroke-width="1"/>
  <circle cx="28" cy="20" r="3" fill="#b8860b"/>
  <circle cx="772" cy="20" r="3" fill="#b8860b"/>
  <circle cx="28" cy="440" r="3" fill="#b8860b"/>
  <circle cx="772" cy="440" r="3" fill="#b8860b"/>

  <!-- Title -->
  <text x="400" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" filter="url(#goldGlow)">XiT / 吸T神功</text>

  <!-- Subtitle -->
  <text x="400" y="100" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#9e8040" text-anchor="middle">专治 AI CLI 被终端日志撑爆上下文</text>
  <text x="400" y="118" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">支持多款 AI CLI</text>

  <!-- Decorative divider -->
  <line x1="120" y1="130" x2="340" y2="130" stroke="#2a1a00" stroke-width="1"/>
  <circle cx="400" cy="130" r="4" fill="#b8860b"/>
  <line x1="460" y1="130" x2="680" y2="130" stroke="#2a1a00" stroke-width="1"/>

  <!-- Terminal card -->
  <rect x="44" y="144" width="712" height="254" rx="10" fill="url(#cardBg)" stroke="#1e2530" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Terminal titlebar -->
  <rect x="44" y="144" width="712" height="36" rx="10" fill="#161b24"/>
  <rect x="44" y="164" width="712" height="16" fill="#161b24"/>
  <circle cx="74" cy="162" r="6" fill="#c0392b"/>
  <circle cx="96" cy="162" r="6" fill="#e67e22"/>
  <circle cx="118" cy="162" r="6" fill="#27ae60"/>
  <text x="400" y="166" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568" text-anchor="middle">terminal — 吸T神功运功中</text>

  <!-- Install command -->
  <text x="68" y="206" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#4a5568">$</text>
  <text x="82" y="206" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12.5" fill="#6b7280">npm i -g xitsg</text>
  <text x="590" y="206" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#56f5a3">added 1 package ✓</text>

  <!-- Main command -->
  <text x="68" y="230" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13.5" fill="#56f5a3">$</text>
  <text x="84" y="230" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13.5" fill="#e2e8f0">xit auto go test -v ./...</text>

  <line x1="68" y1="244" x2="736" y2="244" stroke="#1e2530" stroke-width="1"/>

  <!-- Summary output -->
  <text x="68" y="268" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#56f5a3" font-weight="bold" filter="url(#glow)">XiT Auto Summary</text>

  <text x="68" y="290" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568">退出码:  </text>
  <text x="158" y="290" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#56f5a3">0</text>
  <text x="240" y="290" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568">压缩率:</text>
  <text x="318" y="290" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#56f5a3">99%</text>
  <text x="400" y="290" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568">命中率目标:</text>
  <text x="504" y="290" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#56f5a3">90%+</text>

  <text x="68" y="312" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568">预计可省:  </text>
  <text x="168" y="312" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#ffd700">80%+ Token（saved_bytes/4 est.）</text>

  <text x="68" y="334" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568">raw_log:   </text>
  <text x="168" y="334" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4299e1">.xit/runs/xxx.raw.log</text>
  <text x="530" y="334" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#56f5a3">← 本地留存</text>

  <text x="68" y="356" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#4a5568">要点:       </text>
  <text x="168" y="356" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#cbd5e0">测试通过 · 无 panic · 证据已留存</text>

  <line x1="68" y1="370" x2="736" y2="370" stroke="#1e2530" stroke-width="1"/>

  <!-- Bottom badges -->
  <rect x="44" y="400" width="712" height="40" rx="0" fill="#0a0c0f"/>
  <line x1="44" y1="400" x2="756" y2="400" stroke="#1e2530" stroke-width="1"/>

  <rect x="56" y="410" width="100" height="20" rx="4" fill="#0f1810" stroke="#1e4a30" stroke-width="1"/>
  <text x="106" y="424" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#56f5a3" text-anchor="middle">✓ 无遥测</text>

  <rect x="166" y="410" width="100" height="20" rx="4" fill="#0f1810" stroke="#1e4a30" stroke-width="1"/>
  <text x="216" y="424" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#56f5a3" text-anchor="middle">✓ 本地运行</text>

  <rect x="276" y="410" width="120" height="20" rx="4" fill="#0f1810" stroke="#1e4a30" stroke-width="1"/>
  <text x="336" y="424" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#56f5a3" text-anchor="middle">✓ raw_log 留证</text>

  <rect x="406" y="410" width="120" height="20" rx="4" fill="#0f1810" stroke="#56f5a3" stroke-width="1"/>
  <text x="466" y="424" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#56f5a3" text-anchor="middle">npm i -g xitsg</text>

  <rect x="536" y="410" width="156" height="20" rx="4" fill="#0f1810" stroke="#1e4a30" stroke-width="1"/>
  <text x="614" y="424" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10.5" fill="#ffd700" text-anchor="middle">支持多款 AI CLI</text>
</svg>
